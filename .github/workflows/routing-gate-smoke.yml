name: Routing Gate Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_optional:
        description: Fail the selected optional job to prove gate propagation
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-slim
    outputs:
      selected: ${{ steps.scope.outputs.selected }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Verify slim toolchain and push range
        if: ${{ github.event_name == 'push' }}
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 --version
          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "${HEAD_SHA}^{commit}"
          test -n "$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"

      - id: scope
        env:
          FAIL_OPTIONAL: ${{ inputs.fail_optional || 'false' }}
        run: echo "selected=$FAIL_OPTIONAL" >> "$GITHUB_OUTPUT"

  optional-skipped:
    needs: classify
    if: ${{ needs.classify.outputs.selected == 'never' }}
    runs-on: ubuntu-slim
    steps:
      - run: exit 0

  optional-selected:
    needs: classify
    runs-on: ubuntu-slim
    steps:
      - name: Exercise selected result
        env:
          FAIL_OPTIONAL: ${{ needs.classify.outputs.selected }}
        run: test "$FAIL_OPTIONAL" != "true"

  gate:
    needs:
      - classify
      - optional-skipped
      - optional-selected
    if: ${{ always() }}
    runs-on: ubuntu-slim
    steps:
      - name: Enforce optional job results
        env:
          CLASSIFY_RESULT: ${{ needs.classify.result }}
          SKIPPED_RESULT: ${{ needs.optional-skipped.result }}
          SELECTED_RESULT: ${{ needs.optional-selected.result }}
        run: |
          test "$CLASSIFY_RESULT" = "success"
          test "$SKIPPED_RESULT" = "skipped"
          test "$SELECTED_RESULT" = "success"

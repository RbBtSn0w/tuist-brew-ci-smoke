name: Tuist Homebrew Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tuist-brew-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 20
    env:
      HOMEBREW_NO_ANALYTICS: "1"
      TUIST_VERSION: "4.202.5"
      TUIST_TAP_COMMIT: "b204b859ef513f488de94bcc0d2a58383cb350fe"
    steps:
      - uses: actions/checkout@v6

      - name: Install pinned Tuist formula with Homebrew
        run: |
          local_tap="rbbtsn0w/tuist-ci"
          brew tap-new "${local_tap}"
          tap_path="$(brew --repository "${local_tap}")"
          formula_path="${tap_path}/Formula/tuist@${TUIST_VERSION}.rb"
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/tuist/homebrew-tuist/${TUIST_TAP_COMMIT}/Formula/tuist@${TUIST_VERSION}.rb" \
            --output "${formula_path}"
          brew install --formula "${local_tap}/tuist@${TUIST_VERSION}"

      - name: Verify Tuist version
        run: |
          actual_version="$(tuist version)"
          if [[ "${actual_version}" != "${TUIST_VERSION}" ]]; then
            echo "Expected Tuist ${TUIST_VERSION}, got ${actual_version}" >&2
            exit 1
          fi

      - name: Generate project
        run: tuist generate --no-open

      - name: Build generated project
        run: |
          xcodebuild \
            -project TuistBrewSmoke.xcodeproj \
            -scheme TuistBrewSmoke \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
